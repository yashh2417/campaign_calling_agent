<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Bland AI Call Dashboard</title>
    <link rel="stylesheet" href="/static/styles.css">
    <link rel="icon" href="/static/favicon.ico" type="image/x-icon" />
</head>

<body>
    <div class="container">
        <h1>Bland AI Call Dashboard</h1>

        <section class="form-section">
            <h2>Send Single Call</h2>
            <form id="sendCallForm">
                <input type="text" name="phone_number" placeholder="Phone Number" required>
                <input type="text" name="pathway_id" placeholder="Pathway ID" required>
                <textarea name="variables" placeholder='Variables (JSON)'></textarea>
                <button type="submit">Send Call</button>
            </form>
        </section>

        <section class="form-section">
            <h2>Send Batch Calls</h2>
            <form id="sendBatchForm">
                <textarea name="batch" placeholder='[{"phone_number": "", "pathway_id": "", "variables": {}}]'
                    required></textarea>
                <button type="submit">Send Batch</button>
            </form>
        </section>

        <section class="output">
            <h2>Response</h2>
            <pre id="responseBox"></pre>
        </section>
    </div>

    <script>
        const responseBox = document.getElementById("responseBox");

        document.getElementById("sendCallForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            const form = e.target;
            const data = {
                phone_number: form.phone_number.value,
                pathway_id: form.pathway_id.value,
                variables: form.variables.value ? JSON.parse(form.variables.value) : {}
            };
            const res = await fetch("/bland/sendcall", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(data)
            });
            const json = await res.json();
            responseBox.textContent = JSON.stringify(json, null, 2);
        });

        document.getElementById("sendBatchForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            const form = e.target;
            const data = {
                calls: JSON.parse(form.batch.value)
            };
            const res = await fetch("/bland/sendbatch", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(data)
            });
            const json = await res.json();
            responseBox.textContent = JSON.stringify(json, null, 2);
        });
    </script>
</body>

</html>
