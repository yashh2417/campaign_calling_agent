services:
  - type: web
    name: bland-calls
    env: docker
    plan: free
    autoDeploy: true
    envVars:
      - key: GOOGLE_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: PINECONE_API_KEY
        sync: false
      - key: BLAND_API_KEY
        sync: false
